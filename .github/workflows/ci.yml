name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

  docker:
    name: Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: mediatoolbox:ci

      - name: Validate nginx config
        # The nginx base image's own entrypoint renders the template (envsubst
        # over BACKEND_URL/PORT) into conf.d before exec'ing the CMD. We reuse
        # it via `nginx -t`, so the template is validated exactly as it would be
        # rendered at runtime.
        run: |
          docker run --rm \
            -e BACKEND_URL=http://127.0.0.1:8080 \
            -e PORT=80 \
            mediatoolbox:ci nginx -t
